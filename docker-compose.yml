services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    environment:
      PORT: ${PORT:-3000}
      DATABASE_URL: ${DATABASE_URL:-./apps/api/data/yes-chief.sqlite}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080,http://localhost:5173,http://127.0.0.1:5173,http://localhost:4173,http://127.0.0.1:4173}
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "--eval",
          "fetch('http://127.0.0.1:3000/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    ports:
      - "3000:3000"
    volumes:
      - api-data:/app/apps/api/data

  agent:
    build:
      context: .
      dockerfile: apps/agent/Dockerfile
    depends_on:
      api:
        condition: service_healthy
    env_file:
      - .env
    environment:
      YES_CHIEF_API_BASE_URL: ${YES_CHIEF_API_BASE_URL:-http://api:3000}

  webui:
    build:
      context: .
      dockerfile: apps/webui/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  api-data:
